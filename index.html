<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>六级单词消消乐</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #fbe9f0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; top: -50%; left: -50%;
    width: 200%; height: 200%; z-index: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(253,200,217,0.45), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(185,220,255,0.45), transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(200,240,210,0.3), transparent 50%),
      radial-gradient(circle at 10% 80%, rgba(255,235,200,0.4), transparent 35%),
      radial-gradient(circle at 85% 15%, rgba(210,200,250,0.4), transparent 35%);
    animation: bgFloat 18s ease-in-out infinite;
  }
  @keyframes bgFloat {
    0%,100% { transform: translate(0,0) rotate(0deg); }
    33% { transform: translate(1%,0.5%) rotate(1deg); }
    66% { transform: translate(-0.5%,1%) rotate(-1deg); }
  }
  .container {
    width: 920px; max-width: 95vw; background: rgba(255,255,255,0.92);
    border-radius: 30px 30px 28px 28px;
    box-shadow: 0 8px 40px rgba(254,179,195,0.25), 0 2px 8px rgba(0,0,0,0.06);
    overflow: hidden; position: relative; z-index: 1;
    border: 1.5px solid rgba(255,200,215,0.4);
    backdrop-filter: blur(6px);
  }
  #home-page { padding: 50px 40px; text-align: center; min-height: 600px; position: relative; }
  #home-page::before {
    content: '🌸'; position: absolute; top: 20px; left: 30px; font-size: 32px; opacity: 0.5; animation: floatPet 3s ease-in-out infinite;
  }
  #home-page::after {
    content: '🍃'; position: absolute; top: 22px; right: 35px; font-size: 28px; opacity: 0.45; animation: floatPet 3.2s ease-in-out 0.8s infinite;
  }
  @keyframes floatPet {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(10deg); }
  }
  .home-title {
    font-size: 44px; font-weight: 800; letter-spacing: 2px;
    background: linear-gradient(135deg, #f78ca0, #faa3b7, #c8a8e9, #91c6f0);
    background-size: 300% 300%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px; animation: gradientShift 4s ease infinite;
  }
  @keyframes gradientShift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .home-subtitle { color: #b8a0b0; font-size: 16px; margin-bottom: 16px; }
  .home-progress-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 28px; margin-bottom: 24px;
    background: linear-gradient(135deg, #fff5f8, #ffe0ea);
    border: 2px solid #f5dde4; border-radius: 50px;
    font-size: 20px; font-weight: 800; color: #d47c90;
    box-shadow: 0 2px 10px rgba(247,140,160,0.1);
  }
  .home-progress-badge .hp-count { color: #f78ca0; font-size: 24px; }
  .home-progress-badge .hp-total { color: #b8a0b0; font-size: 18px; }
  .start-btn {
    display: inline-block; padding: 16px 60px; font-size: 22px; font-weight: 700;
    color: #fff; background: linear-gradient(135deg, #f78ca0, #e77cbf, #91a8f0);
    border: none; border-radius: 50px; cursor: pointer; transition: all 0.35s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 6px 24px rgba(247,140,160,0.35);
    position: relative; overflow: hidden; letter-spacing: 2px;
  }
  .start-btn::after {
    content: ''; position: absolute; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.25), transparent 60%);
    opacity: 0; transition: opacity 0.3s;
  }
  .start-btn:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(247,140,160,0.45); }
  .start-btn:hover::after { opacity: 1; }
  .start-btn:active { transform: translateY(-1px) scale(0.97); }
  .dessert-showcase {
    margin-top: 40px; background: rgba(255,240,245,0.7);
    border-radius: 24px; padding: 20px; border: 1.5px dashed #f0ccd8;
  }
  .dessert-showcase h3 { font-size: 18px; color: #d498a8; margin-bottom: 16px; font-weight: 700; }
  .dessert-grid {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
    max-height: 280px; overflow-y: auto; padding: 6px;
  }
  .dessert-item {
    font-size: 34px; width: 52px; height: 52px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(145deg, #fff5f8, #ffe0ea);
    border-radius: 16px; transition: all 0.3s cubic-bezier(.4,0,.2,1);
    cursor: default; position: relative;
    box-shadow: 0 3px 10px rgba(247,140,160,0.12);
  }
  .dessert-item:hover { transform: scale(1.25) rotate(-6deg); box-shadow: 0 6px 18px rgba(247,140,160,0.22); }
  .dessert-item .level-badge {
    position: absolute; bottom: -3px; right: -4px; font-size: 9px; font-weight: 800;
    background: linear-gradient(135deg, #f78ca0, #e77cbf); color: #fff;
    border-radius: 8px; padding: 1px 4px; box-shadow: 0 1px 4px rgba(247,140,160,0.3);
  }
  .dessert-empty { color: #d4bcc4; font-size: 14px; padding: 30px; }
  .progress-info { margin-top: 22px; font-size: 14px; color: #c4a8b5; font-weight: 600; }

  #level-page { padding: 30px; min-height: 600px; position: relative; }
  #level-page::before {
    content: '🍬'; position: absolute; top: 16px; right: 28px; font-size: 24px;
    opacity: 0.4; animation: floatPet 2.8s ease-in-out 0.4s infinite;
  }
  .level-header { display: flex; align-items: center; margin-bottom: 22px; }
  .back-btn {
    padding: 9px 22px; background: #fdeaf0; color: #d47c90; border: none;
    border-radius: 24px; cursor: pointer; font-size: 14px; margin-right: 16px;
    transition: all 0.25s; font-weight: 600;
  }
  .back-btn:hover { background: #fcd5df; transform: translateX(-3px); }
  .level-header h2 { font-size: 24px; color: #5a4550; font-weight: 700; }
  .level-grid {
    display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px;
    max-height: 450px; overflow-y: auto; padding: 10px;
  }
  .level-btn {
    aspect-ratio: 1; border: 2px solid #f5dde4; border-radius: 16px;
    font-size: 17px; font-weight: 700; color: #9e7c88;
    background: linear-gradient(145deg, #fff, #fff5f8);
    cursor: pointer; transition: all 0.25s;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    box-shadow: 0 2px 8px rgba(247,140,160,0.08);
  }
  .level-btn:hover { border-color: #f78ca0; color: #f78ca0; transform: scale(1.08); box-shadow: 0 4px 16px rgba(247,140,160,0.2); }
  .level-btn.cleared {
    background: linear-gradient(135deg, #fbc2cf, #e4b4d9, #b5c8f7);
    color: #fff; border-color: transparent;
    box-shadow: 0 3px 12px rgba(200,160,210,0.25);
  }
  .level-btn .mini-dessert { font-size: 20px; }
  .level-btn.locked { opacity: 0.35; cursor: not-allowed; background: #f5f5f5; }

  #game-page { padding: 22px; min-height: 600px; position: relative; }
  .music-toggle {
    position: absolute; top: 16px; right: 20px; z-index: 10;
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid #f5dde4; background: rgba(255,255,255,0.85);
    font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s; box-shadow: 0 2px 8px rgba(247,140,160,0.1);
  }
  .music-toggle:hover { background: #fff5f8; border-color: #f78ca0; transform: scale(1.1); }
  .music-toggle.muted { opacity: 0.5; border-color: #ddd; background: #f9f9f9; }
  .music-toggle.muted::after { content: ''; position: absolute; width: 2px; height: 20px; background: #ccc; transform: rotate(-45deg); border-radius: 1px; }
  .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .game-level { font-size: 20px; font-weight: 700; color: #5a4550; }
  .game-progress { font-size: 14px; color: #c495a5; font-weight: 600; }
  .game-back-btn {
    padding: 8px 18px; background: #fdeaf0; color: #d47c90;
    border: none; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s;
  }
  .game-back-btn:hover { background: #fcd5df; }
  .timer {
    font-size: 18px; font-weight: 800; color: #fff;
    background: linear-gradient(135deg, #91c6f0, #c8a8e9);
    padding: 6px 16px; border-radius: 20px; letter-spacing: 1px;
    display: inline-flex; align-items: center; gap: 6px;
    box-shadow: 0 2px 8px rgba(145,198,240,0.25);
  }
  .timer.warning { background: linear-gradient(135deg, #f9a5c2, #f78ca0); animation: pulse-warn 0.8s ease-in-out infinite; }
  .timer.danger { background: linear-gradient(135deg, #ff7b7b, #e05050); animation: pulse-warn 0.45s ease-in-out infinite; }
  @keyframes pulse-warn {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .progress-bar {
    height: 10px; background: #fde8ee; border-radius: 10px;
    margin-bottom: 18px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
  }
  .progress-fill {
    height: 100%; border-radius: 10px;
    background: linear-gradient(90deg, #fbc2cf, #f9a5c2, #c4a8e0);
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .progress-fill::after {
    content: ''; position: absolute; right: 0; top: 0; width: 20px; height: 100%;
    background: rgba(255,255,255,0.5); border-radius: 0 10px 10px 0;
  }
  .game-area { display: flex; gap: 28px; justify-content: center; min-height: 440px; }
  .word-column, .meaning-column { flex: 1; max-width: 390px; }
  .column-title {
    text-align: center; font-size: 16px; font-weight: 700; color: #c495a5;
    margin-bottom: 12px; padding-bottom: 10px;
    border-bottom: 2px dashed #f5dde4; letter-spacing: 1px;
  }
  .word-card, .meaning-card {
    padding: 14px 18px; margin-bottom: 8px; border-radius: 16px;
    cursor: pointer; transition: all 0.28s cubic-bezier(.4,0,.2,1);
    font-size: 15px; text-align: center; border: 2px solid transparent;
    position: relative;
  }
  .word-card {
    background: linear-gradient(145deg, #fdf4f7, #fbebf0);
    color: #5a3d48; font-weight: 600;
    box-shadow: 0 2px 8px rgba(247,140,160,0.08);
  }
  .meaning-card {
    background: linear-gradient(145deg, #fef9fb, #fdf2f6);
    color: #5a3d48;
    box-shadow: 0 2px 8px rgba(247,140,160,0.08);
  }
  .word-card:hover:not(.matched):not(.selected),
  .meaning-card:hover:not(.matched):not(.selected) {
    transform: translateY(-3px);
    box-shadow: 0 6px 18px rgba(247,140,160,0.18);
  }
  .word-card.selected {
    border-color: #91c6f0;
    background: linear-gradient(135deg, #d6ebfa, #b9d8f7);
    color: #2e5678; transform: scale(1.04);
    box-shadow: 0 6px 20px rgba(145,198,240,0.35);
  }
  .meaning-card.selected {
    border-color: #f78ca0;
    background: linear-gradient(135deg, #fde0e8, #fcd0dc);
    color: #783045; transform: scale(1.04);
    box-shadow: 0 6px 20px rgba(247,140,160,0.35);
  }
  .word-card.matched, .meaning-card.matched {
    opacity: 0; transform: scale(0.8) rotateX(15deg);
    pointer-events: none; transition: all 0.5s cubic-bezier(.4,0,.2,1);
  }
  .word-card.wrong, .meaning-card.wrong {
    animation: shake 0.45s ease; border-color: #ff9e9e;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    15% { transform: translateX(-9px); }
    35% { transform: translateX(9px); }
    55% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  #congrats-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 600px; padding: 40px; text-align: center; position: relative; }
  #congrats-page::before {
    content: '🎊'; position: absolute; top: 30px; left: 40px; font-size: 40px; opacity: 0.5; animation: floatPet 3s ease-in-out infinite;
  }
  #congrats-page::after {
    content: '🎀'; position: absolute; bottom: 30px; right: 40px; font-size: 36px; opacity: 0.5; animation: floatPet 3s ease-in-out 1s infinite;
  }
  .congrats-title {
    font-size: 34px; font-weight: 800; letter-spacing: 2px;
    background: linear-gradient(135deg, #f78ca0, #e77cbf, #91a8f0);
    background-size: 200% 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 24px; animation: gradientShift 3s ease infinite;
  }
  .congrats-dessert { font-size: 90px; animation: bounce 1s ease infinite; filter: drop-shadow(0 8px 16px rgba(247,140,160,0.25)); }
  @keyframes bounce {
    0%,100% { transform: translateY(0) scale(1); }
    40% { transform: translateY(-24px) scale(1.08); }
    60% { transform: translateY(-8px); }
  }
  .congrats-dessert-name { font-size: 20px; color: #b08a99; margin: 12px 0 32px; font-weight: 600; }
  .home-return-btn {
    padding: 14px 50px; font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 2px;
    background: linear-gradient(135deg, #f78ca0, #e77cbf, #91a8f0);
    border: none; border-radius: 50px; cursor: pointer; transition: all 0.35s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 6px 24px rgba(247,140,160,0.3);
  }
  .home-return-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(247,140,160,0.4); }
  .home-return-btn:active { transform: scale(0.96); }

  #preview-page { padding: 30px; min-height: 600px; position: relative; }
  .preview-header { display: flex; align-items: center; margin-bottom: 16px; }
  .preview-header h2 { font-size: 22px; color: #5a4550; font-weight: 700; margin-left: 8px; }
  .preview-info { text-align: center; color: #b08a99; font-size: 14px; margin-bottom: 18px; }
  .preview-table-wrap { max-height: 400px; overflow-y: auto; border-radius: 16px; border: 1.5px solid #f5dde4; }
  .preview-table { width: 100%; border-collapse: collapse; }
  .preview-table th {
    position: sticky; top: 0; z-index: 2;
    background: linear-gradient(135deg, #fdf4f7, #fde8ee);
    padding: 12px; font-size: 14px; color: #d47c90; letter-spacing: 1px;
    border-bottom: 2px solid #f5dde4;
  }
  .preview-table td {
    padding: 10px 14px; font-size: 14px; color: #5a3d48; text-align: center;
    border-bottom: 1px solid #faf0f3; transition: background 0.2s;
  }
  .preview-table tr:hover td { background: #fff5f8; }
  .preview-table .row-num { color: #c495a5; font-weight: 700; width: 50px; }
  .preview-table .row-word { font-weight: 600; }
  .preview-start-btn {
    display: block; margin: 20px auto 0; padding: 14px 60px; font-size: 18px; font-weight: 700;
    color: #fff; background: linear-gradient(135deg, #f78ca0, #e77cbf, #91a8f0);
    border: none; border-radius: 50px; cursor: pointer; transition: all 0.35s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 6px 24px rgba(247,140,160,0.3); letter-spacing: 2px;
  }
  .preview-start-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(247,140,160,0.4); }
  .preview-start-btn:active { transform: scale(0.96); }

  #failed-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 600px; padding: 40px; text-align: center; position: relative; }
  #failed-page::before {
    content: '😢'; position: absolute; top: 30px; left: 40px; font-size: 40px; opacity: 0.5; animation: floatPet 3s ease-in-out infinite;
  }
  #failed-page::after {
    content: '💧'; position: absolute; bottom: 30px; right: 40px; font-size: 30px; opacity: 0.4; animation: floatPet 3s ease-in-out 1s infinite;
  }
  .failed-title {
    font-size: 30px; font-weight: 800; letter-spacing: 2px;
    background: linear-gradient(135deg, #a0a0b0, #c0b0c0, #d0c0d0);
    background-size: 200% 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .failed-subtitle { font-size: 16px; color: #b08a99; margin-bottom: 24px; }
  .failed-dessert { font-size: 80px; opacity: 0.6; filter: grayscale(0.8); margin-bottom: 16px; }
  .failed-actions { display: flex; gap: 16px; }
  .retry-btn {
    padding: 14px 40px; font-size: 17px; font-weight: 700; letter-spacing: 2px;
    color: #fff; background: linear-gradient(135deg, #f78ca0, #e77cbf);
    border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s;
    box-shadow: 0 6px 20px rgba(247,140,160,0.3);
  }
  .retry-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(247,140,160,0.4); }
  .retry-btn:active { transform: scale(0.96); }

  .review-section { margin-top: 30px; width: 100%; max-width: 650px; }
  .review-title { font-size: 16px; font-weight: 700; color: #c495a5; margin-bottom: 14px; text-align: center; }
  .review-list { max-height: 260px; overflow-y: auto; }
  .review-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    margin-bottom: 6px; background: #fff5f8; border-radius: 12px;
    border: 1px solid #fde0e8; font-size: 14px; text-align: left;
  }
  .review-item .rv-word { font-weight: 700; color: #5a3d48; min-width: 100px; }
  .review-item .rv-wrong { color: #e05050; text-decoration: line-through; flex: 1; }
  .review-item .rv-arrow { color: #c495a5; font-weight: 600; }
  .review-item .rv-correct { color: #38a169; font-weight: 600; flex: 1; }
  .review-empty { color: #c495a5; font-size: 14px; text-align: center; padding: 10px; }

  .firework { position: fixed; pointer-events: none; z-index: 9999; }
  .particle { position: absolute; width: 8px; height: 8px; border-radius: 50%; animation: particle-fly 1.2s ease-out forwards; }
  @keyframes particle-fly { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }
  .match-effect { position: fixed; pointer-events: none; z-index: 9999; font-size: 28px; animation: match-pop 0.9s ease-out forwards; }
  @keyframes match-pop { 0% { transform: scale(0.3) rotate(-10deg); opacity: 1; } 50% { transform: scale(1.6) rotate(5deg); opacity: 0.8; } 100% { transform: scale(2.2) rotate(0deg); opacity: 0; } }
  .page { display: none; } .page.active { display: block; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #f5c5d3; border-radius: 3px; }

  @media (max-width: 640px) {
    .home-title { font-size: 32px; }
    .game-area { flex-direction: column; gap: 16px; }
    .word-column, .meaning-column { max-width: 100%; }
    .level-grid { grid-template-columns: repeat(5, 1fr); }
  }
</style>
</head>
<body>

<div class="container">
  <div id="home-page" class="page active">
    <button class="music-toggle" id="home-music-toggle" onclick="toggleHomeMusic()" title="音乐" style="top: 12px; right: 16px;">🎵</button>
    <div class="home-title">🍰 六级单词消消乐</div>
    <div class="home-subtitle">CET-6 高频词汇，每关30词，匹配通关抓点心！</div>
    <div id="home-progress-badge" class="home-progress-badge">
      🏆 <span class="hp-count">0</span><span class="hp-total">/0</span>
    </div>
    <button class="start-btn" onclick="showLevelPage()">开始游戏</button>
    <div class="dessert-showcase">
      <h3>🎒 我的点心收藏</h3>
      <div id="dessert-grid" class="dessert-grid"></div>
    </div>
    <div id="progress-info" class="progress-info"></div>
  </div>

  <div id="level-page" class="page">
    <div class="level-header">
      <button class="back-btn" onclick="showHomePage()">← 返回</button>
      <h2>选择关卡</h2>
    </div>
    <div id="level-grid" class="level-grid"></div>
  </div>

  <div id="preview-page" class="page">
    <div class="preview-header">
      <button class="back-btn" onclick="showLevelPage()">← 返回</button>
      <h2 id="preview-level-title">第 1 关 单词预习</h2>
    </div>
    <div class="preview-info">📖 共 <b><span id="preview-count"></span></b> 个单词，熟悉后再点击开始挑战</div>
    <div class="preview-table-wrap">
      <table class="preview-table">
        <thead><tr><th>序号</th><th>单词</th><th>词义</th></tr></thead>
        <tbody id="preview-table-body"></tbody>
      </table>
    </div>
    <button class="preview-start-btn" id="preview-start-btn" onclick="startGame()">⚡ 开始挑战</button>
  </div>

  <div id="game-page" class="page">
    <button class="music-toggle" id="music-toggle" onclick="toggleMusic()" title="音乐">🎵</button>
    <div class="game-header">
      <button class="game-back-btn" onclick="confirmExit()">← 退出</button>
      <span id="game-level" class="game-level"></span>
      <span id="game-timer" class="timer">⏱ 07:00</span>
      <span id="game-progress" class="game-progress"></span>
    </div>
    <div class="progress-bar"><div id="progress-fill" class="progress-fill" style="width:0%"></div></div>
    <div class="game-area">
      <div class="word-column">
        <div class="column-title">📝 单词</div>
        <div id="word-list"></div>
      </div>
      <div class="meaning-column">
        <div class="column-title">📖 词义</div>
        <div id="meaning-list"></div>
      </div>
    </div>
  </div>

  <div id="congrats-page" class="page">
    <div class="congrats-title">🎉 恭喜你！抓到点心！</div>
    <div id="congrats-dessert" class="congrats-dessert"></div>
    <div id="congrats-dessert-name" class="congrats-dessert-name"></div>
    <div class="review-section" id="congrats-review">
      <div class="review-title">📋 配对纠错复习</div>
      <div class="review-list" id="congrats-review-list"></div>
    </div>
    <button class="home-return-btn" onclick="showHomePage()">返回首页</button>
  </div>

  <div id="failed-page" class="page">
    <div class="failed-title">⏰ 时间到！</div>
    <div class="failed-subtitle">很遗憾，7分钟倒计时结束，挑战失败啦</div>
    <div id="failed-dessert" class="failed-dessert"></div>
    <div id="failed-dessert-name" class="congrats-dessert-name"></div>
    <div class="review-section" id="failed-review">
      <div class="review-title">📋 配对纠错复习</div>
      <div class="review-list" id="failed-review-list"></div>
    </div>
    <div class="failed-actions">
      <button class="home-return-btn" onclick="showHomePage()">返回首页</button>
      <button class="retry-btn" onclick="retryLevel()">🔄 重新挑战</button>
    </div>
  </div>
</div>

<script src="words1.js"></script>
<script src="words2.js"></script>
<script src="words3.js"></script>
<script src="words4.js"></script>
<script src="words5.js"></script>
<script src="words6.js"></script>
<script src="words7.js"></script>
<script src="words8.js"></script>
<script>
// 合并所有单词数据
const WORD_DATA = [].concat(DATA1, DATA2, DATA3, DATA4, DATA5, DATA6, DATA7, DATA8);
const TOTAL_LEVELS = WORD_DATA.length;

// ===== 点心数据 =====
const DESSERTS = [
  '🍰','🧁','🍩','🍪','🥐','🥨','🧇','🍞','🥯','🎂',
  '🍮','🍬','🍭','🍫','🧀','🥞','🍳','🥧','🍨','🍦',
  '🥮','🍡','🍢','🍘','🍙','🍚','🥟','🥠','🧁','🍰',
  '🍩','🍪','🥐','🎂','🍮','🍬','🍭','🍫','🧀','🥞',
  '🥧','🍨','🍦','🥮','🍡','🍢','🍘','🍙','🍚','🥟',
  '🥠','🍰','🧁','🍩','🍪','🥐','🎂','🍮','🍬','🍭',
  '🍫','🧀','🥞','🥧','🍨','🍦','🥮','🍡','🍢','🍘',
  '🍙','🍚','🥟','🥠','🍰','🧁','🍩','🍪','🥐','🎂'
];
const DESSERT_NAMES = [
  '草莓蛋糕','纸杯蛋糕','甜甜圈','巧克力饼干','牛角面包',
  '椒盐脆饼','华夫饼','吐司面包','百吉饼','生日蛋糕',
  '焦糖布丁','水果糖','棒棒糖','巧克力棒','奶酪块',
  '松饼','煎蛋','南瓜派','冰淇淋球','香草冰激凌',
  '月饼','团子','关东煮','仙贝','饭团',
  '米饭','虾饺','蛋卷','麻薯','蓝莓马芬',
  '黑森林蛋糕','蜜糖甜甜圈','燕麦饼干','法式可颂',
  '彩虹蛋糕','奶昔布丁','棉花糖','水果硬糖','白巧克力',
  '蓝纹奶酪','蓝莓松饼','苹果派','草莓圣代','抹茶冰淇淋',
  '蛋黄酥','芝麻团子','味噌丸子','海苔仙贝','金枪鱼饭团',
  '杏仁酥','栗子蛋糕','红丝绒蛋糕','肉桂卷','黄油曲奇',
  '羊角可颂','千层蛋糕','芒果布丁','太妃糖','水晶棒糖',
  '黑巧克力','手撕奶酪','美式热松饼','樱桃派','薄荷圣代',
  '焦糖冰淇淋','冰皮月饼','红豆团子','昆布卷','烤米饼',
  '梅子饭团','鳗鱼饭','翡翠烧卖','花生糖','抹茶马芬',
  '提拉米苏','枫糖甜甜圈','奶油泡芙','焦糖马芬'
];

// ===== 游戏状态 =====
let clearedLevels = JSON.parse(localStorage.getItem('clearedLevels') || '[]');
let currentLevel = 0;
let currentWords = [];
let remainingWords = [];
let displayWords = [];
let displayMeanings = [];
let selectedWord = null;
let selectedMeaning = null;
let matchedCount = 0;
let totalWords = 30;
let isAnimating = false;
let timerInterval = null;
let timeLeft = 420; // 7分钟 = 420秒
let wrongMatches = []; // 记录错误配对
const TOTAL_TIME = 420;

// ===== 背景音乐 =====
let bgmAudio = null;
let musicPlaying = false;

function initMusic() {
  if (bgmAudio) return;
  bgmAudio = new Audio('bgm.mp3');
  bgmAudio.loop = true;
  bgmAudio.volume = 0.2;
  bgmAudio.preload = 'auto';
}

function startMusic() {
  initMusic();
  syncMusicUI();
  if (musicPlaying) return;
  musicPlaying = true;
  syncMusicUI();
  bgmAudio.play().catch(() => {});
}

function stopMusic() {
  musicPlaying = false;
  if (bgmAudio) { bgmAudio.pause(); bgmAudio.currentTime = 0; }
  syncMusicUI();
}

function toggleHomeMusic() {
  if (musicPlaying) stopMusic(); else startMusic();
}

function toggleMusic() {
  toggleHomeMusic();
}

function syncMusicUI() {
  const btn1 = document.getElementById('music-toggle');
  const btn2 = document.getElementById('home-music-toggle');
  [btn1, btn2].forEach(btn => {
    if (!btn) return;
    if (musicPlaying) {
      btn.classList.remove('muted');
      btn.textContent = '🎵';
    } else {
      btn.classList.add('muted');
      btn.textContent = '🔇';
    }
  });
}

// ===== 页面切换 =====
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}
function showHomePage() {
  showPage('home-page');
  renderDessertGrid();
  document.getElementById('home-progress-badge').innerHTML = `🏆 <span class="hp-count">${clearedLevels.length}</span><span class="hp-total">/${TOTAL_LEVELS}</span>`;
  document.getElementById('progress-info').textContent = `已通关 ${clearedLevels.length}/${TOTAL_LEVELS} 关`;
}
function showLevelPage() {
  showPage('level-page');
  renderLevelGrid();
}

// ===== 首页点心展示 =====
function renderDessertGrid() {
  const grid = document.getElementById('dessert-grid');
  if (clearedLevels.length === 0) {
    grid.innerHTML = '<div class="dessert-empty">还没有抓到点心哦，快去闯关吧！🧁</div>';
    return;
  }
  grid.innerHTML = clearedLevels.map(lvl => `
    <div class="dessert-item" title="第${lvl}关: ${DESSERT_NAMES[lvl-1]}">
      ${DESSERTS[lvl-1]}
      <span class="level-badge">${lvl}</span>
    </div>
  `).join('');
}

// ===== 关卡选择 =====
function renderLevelGrid() {
  const grid = document.getElementById('level-grid');
  let html = '';
  for (let i = 1; i <= TOTAL_LEVELS; i++) {
    const isCleared = clearedLevels.includes(i);
    const isUnlocked = i === 1 || clearedLevels.includes(i - 1);
    const cls = isCleared ? 'cleared' : (!isUnlocked ? 'locked' : '');
    const mini = isCleared ? `<span class="mini-dessert">${DESSERTS[i-1]}</span>` : '';
    html += `<button class="level-btn ${cls}" onclick="${isUnlocked ? `startLevel(${i})` : ''}" ${!isUnlocked ? 'disabled' : ''}>
      ${mini}<span>${i}</span>
    </button>`;
  }
  grid.innerHTML = html;
}

// ===== 开始关卡（进入预习页） =====
function startLevel(level) {
  currentLevel = level;
  currentWords = [...WORD_DATA[level - 1]];
  showPage('preview-page');
  document.getElementById('preview-level-title').textContent = `第 ${level} 关 单词预习`;
  document.getElementById('preview-count').textContent = currentWords.length;
  const tbody = document.getElementById('preview-table-body');
  tbody.innerHTML = currentWords.map((item, i) => `
    <tr>
      <td class="row-num">${i + 1}</td>
      <td class="row-word">${item.word}</td>
      <td>${item.meaning}</td>
    </tr>
  `).join('');
}

// ===== 开始游戏（从预习页） =====
function startGame() {
  remainingWords = [...currentWords];
  matchedCount = 0;
  wrongMatches = [];
  selectedWord = null;
  selectedMeaning = null;
  isAnimating = false;
  timeLeft = TOTAL_TIME;
  showPage('game-page');
  document.getElementById('game-level').textContent = `第 ${currentLevel} 关`;
  updateTimer();
  startTimer();
  startMusic();
  updateProgress();
  loadNextBatch();
}

// ===== 倒计时 =====
function startTimer() {
  stopTimer();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) {
      stopTimer();
      showFailedPage();
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimer() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  const el = document.getElementById('game-timer');
  el.textContent = `⏱ ${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  el.classList.remove('warning', 'danger');
  if (timeLeft <= 60) el.classList.add('danger');
  else if (timeLeft <= 120) el.classList.add('warning');
}

// ===== 失败页面 =====
function showFailedPage() {
  stopTimer();
  stopMusic();
  showPage('failed-page');
  document.getElementById('failed-dessert').textContent = DESSERTS[currentLevel - 1];
  document.getElementById('failed-dessert-name').textContent = `第${currentLevel}关: ${DESSERT_NAMES[currentLevel - 1]}`;
  renderWrongReview('failed-review-list');
}

// ===== 渲染错误配对复习 =====
function renderWrongReview(listId) {
  const list = document.getElementById(listId);
  if (wrongMatches.length === 0) {
    list.innerHTML = '<div class="review-empty">太棒了！没有错误配对 ✨</div>';
    return;
  }
  list.innerHTML = wrongMatches.map(m => `
    <div class="review-item">
      <span class="rv-word">${m.word}</span>
      <span class="rv-wrong">${m.wrongMeaning}</span>
      <span class="rv-arrow">→</span>
      <span class="rv-correct">${m.correctMeaning}</span>
    </div>
  `).join('');
}

// ===== 重新挑战 =====
function retryLevel() {
  startGame();
}

function updateProgress() {
  const pct = (matchedCount / totalWords * 100).toFixed(0);
  document.getElementById('game-progress').textContent = `${matchedCount}/${totalWords}`;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function loadNextBatch() {
  const batch = remainingWords.slice(0, 10);
  displayWords = batch.map((item, i) => ({ ...item, id: i }));
  displayMeanings = [...batch].sort(() => Math.random() - 0.5).map((item, i) => ({ ...item, id: i }));
  selectedWord = null;
  selectedMeaning = null;
  renderWords();
  renderMeanings();
}

function renderWords() {
  document.getElementById('word-list').innerHTML = displayWords.map(item => `
    <div class="word-card ${item.matched ? 'matched' : ''} ${selectedWord && selectedWord.id === item.id ? 'selected' : ''}"
         data-id="${item.id}" onclick="selectWord(${item.id})">
      ${item.word}
    </div>
  `).join('');
}

function renderMeanings() {
  document.getElementById('meaning-list').innerHTML = displayMeanings.map(item => `
    <div class="meaning-card ${item.matched ? 'matched' : ''} ${selectedMeaning && selectedMeaning.id === item.id ? 'selected' : ''}"
         data-id="${item.id}" onclick="selectMeaning(${item.id})">
      ${item.meaning}
    </div>
  `).join('');
}

function selectWord(id) {
  if (isAnimating) return;
  const item = displayWords.find(w => w.id === id);
  if (!item || item.matched) return;
  selectedWord = item;
  renderWords();
  checkMatch();
}

function selectMeaning(id) {
  if (isAnimating) return;
  const item = displayMeanings.find(m => m.id === id);
  if (!item || item.matched) return;
  selectedMeaning = item;
  renderMeanings();
  checkMatch();
}

function checkMatch() {
  if (!selectedWord || !selectedMeaning) return;
  isAnimating = true;
  if (selectedWord.word === selectedMeaning.word && selectedWord.meaning === selectedMeaning.meaning) {
    selectedWord.matched = true;
    selectedMeaning.matched = true;
    matchedCount++;
    showMatchEffect();
    speakWord(selectedWord.word);
    setTimeout(() => {
      renderWords();
      renderMeanings();
      updateProgress();
      remainingWords = remainingWords.filter(w => w.word !== selectedWord.word);
      selectedWord = null;
      selectedMeaning = null;
      const unmatchedDisplay = displayWords.filter(w => !w.matched);
      if (unmatchedDisplay.length === 0 && remainingWords.length > 0) {
        setTimeout(() => loadNextBatch(), 300);
      } else if (remainingWords.length === 0 && unmatchedDisplay.length === 0) {
        setTimeout(() => showCongrats(), 500);
      }
      isAnimating = false;
    }, 400);
  } else {
    // 记录错误配对
    const existing = wrongMatches.find(m => m.word === selectedWord.word);
    if (!existing) {
      wrongMatches.push({
        word: selectedWord.word,
        wrongMeaning: selectedMeaning.meaning,
        correctMeaning: selectedWord.meaning
      });
    }
    const wordCards = document.querySelectorAll('.word-card.selected');
    const meaningCards = document.querySelectorAll('.meaning-card.selected');
    wordCards.forEach(c => c.classList.add('wrong'));
    meaningCards.forEach(c => c.classList.add('wrong'));
    setTimeout(() => {
      selectedWord = null;
      selectedMeaning = null;
      wordCards.forEach(c => { c.classList.remove('wrong', 'selected'); });
      meaningCards.forEach(c => { c.classList.remove('wrong', 'selected'); });
      isAnimating = false;
    }, 500);
  }
}

function showMatchEffect() {
  const emojis = ['🌟','💖','🎀','✨','💫','🌷','🫧'];
  const el = document.createElement('div');
  el.className = 'match-effect';
  el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  el.style.left = (40 + Math.random() * 20) + '%';
  el.style.top = (30 + Math.random() * 40) + '%';
  el.style.transform = 'translate(-50%, -50%)';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function speakWord(word) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.pitch = 1;
  window.speechSynthesis.speak(utter);
}

function showCongrats() {
  stopTimer();
  stopMusic();
  if (!clearedLevels.includes(currentLevel)) {
    clearedLevels.push(currentLevel);
    localStorage.setItem('clearedLevels', JSON.stringify(clearedLevels));
  }
  showPage('congrats-page');
  document.getElementById('congrats-dessert').textContent = DESSERTS[currentLevel - 1];
  document.getElementById('congrats-dessert-name').textContent = `第${currentLevel}关: ${DESSERT_NAMES[currentLevel - 1]}`;
  renderWrongReview('congrats-review-list');
  createFireworks();
}

function createFireworks() {
  const colors = ['#f78ca0','#ffb6c1','#c8a8e9','#91c6f0','#b5e8c3','#ffe5a0','#f9b8d0','#a8d8ea'];
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      const x = Math.random() * window.innerWidth;
      const y = Math.random() * window.innerHeight * 0.6 + 50;
      const fw = document.createElement('div');
      fw.className = 'firework';
      fw.style.left = x + 'px';
      fw.style.top = y + 'px';
      for (let j = 0; j < 22; j++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = (j / 22) * Math.PI * 2;
        const dist = 50 + Math.random() * 70;
        p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.width = (5 + Math.random() * 6) + 'px';
        p.style.height = p.style.width;
        fw.appendChild(p);
      }
      document.body.appendChild(fw);
      setTimeout(() => fw.remove(), 1400);
    }, i * 350);
  }
}

function confirmExit() {
  if (confirm('确定要退出当前关卡吗？进度将不会保存。')) {
    stopTimer();
    stopMusic();
    showLevelPage();
  }
}

showHomePage();
</script>

</html>
